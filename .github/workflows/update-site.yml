name: Auto-Update Databricks Knowledge Hub

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI
    inputs:
      force_update:
        description: 'Force update even if no new content found'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4 google-generativeai

      # ── 4. Scrape + Update via Gemini ─────────────────────────────
      - name: Scrape Databricks sources and update site
        id: update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/update_site.py

      # ── 5. Commit changes if site was updated ─────────────────────
      - name: Commit updated site
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🤖 Auto-update: Databricks content refresh $(date +'%Y-%m-%d')"
          git push

      # ── 6. Skip message if nothing changed ────────────────────────
      - name: No update needed
        if: steps.update.outputs.updated == 'false'
        run: echo "✅ Site is already up to date. No changes committed."
