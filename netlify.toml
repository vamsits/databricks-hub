[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cloudflare.com; style-src 'self' 'unsafe-inline' https://googleapis.com; style-src-elem 'self' 'unsafe-inline' https://googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://amazonaws.com;"
